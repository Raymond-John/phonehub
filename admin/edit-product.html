<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Edit Product - NovaTech X1 Pro | PhoneHub Admin</title>
  <style>
    /* ================================
       PhoneHub Admin - Edit Product
       Fully Responsive (No extra product logic)
       ================================ */
    :root {
      --primary: #1a56db;
      --primary-dark: #1e429f;
      --primary-light: #e1effe;
      --success: #059669;
      --danger: #dc2626;
      --warning: #f59e0b;
      --dark: #111827;
      --gray-900: #1f2937;
      --gray-800: #374151;
      --gray-700: #4b5563;
      --gray-600: #6b7280;
      --gray-500: #9ca3af;
      --gray-400: #d1d5db;
      --gray-300: #e5e7eb;
      --gray-200: #f3f4f6;
      --gray-100: #f9fafb;
      --white: #ffffff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius: 0.5rem;
      --radius-lg: 0.75rem;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      overflow-x: hidden;
    }

    /* Admin Wrapper */
    .admin-wrapper {
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    /* Sidebar - responsive sliding */
    .sidebar {
      width: 260px;
      background: var(--dark);
      color: var(--gray-400);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 1000;
      transition: transform 0.3s ease;
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-800);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--white);
      font-weight: 800;
      font-size: 1.2rem;
    }

    .sidebar-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .sidebar-toggle {
      background: none;
      border: none;
      color: var(--gray-500);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.25rem;
      border-radius: var(--radius);
      transition: var(--transition);
    }
    .sidebar-toggle:hover {
      background: var(--gray-800);
      color: var(--white);
    }

    .sidebar-nav {
      flex: 1;
      padding: 1.5rem 0;
      list-style: none;
    }

    .sidebar-nav li a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      color: var(--gray-400);
      text-decoration: none;
      transition: var(--transition);
      font-size: 0.95rem;
    }

    .sidebar-nav li a:hover,
    .sidebar-nav li a.active {
      background: var(--gray-800);
      color: var(--white);
    }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--gray-800);
    }

    .back-to-site {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray-400);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-to-site:hover {
      color: var(--white);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
      transition: margin-left 0.3s ease;
      width: calc(100% - 260px);
    }

    /* Top Header - responsive */
    .top-header {
      background: var(--white);
      padding: 0.75rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gray-900);
    }

    .mobile-sidebar-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--gray-700);
      padding: 0.25rem;
      border-radius: var(--radius);
      line-height: 1;
    }
    .mobile-sidebar-toggle:hover {
      background: var(--gray-100);
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.85rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--gray-200);
      color: var(--gray-800);
    }
    .btn-secondary:hover {
      background: var(--gray-300);
    }

    /* Form Card */
    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--gray-200);
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gray-900);
    }
    .card-body {
      padding: 1.5rem;
    }

    /* Form Grid - fully responsive */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--gray-700);
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 0.9rem;
      background: var(--white);
      transition: var(--transition);
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    /* Image Preview - responsive */
    .image-preview {
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .image-preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--gray-300);
      background: var(--gray-100);
    }
    .image-note {
      font-size: 0.7rem;
      color: var(--gray-500);
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .content {
      padding: 1.5rem;
    }

    /* Mobile Overlay */
    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
    }
    .mobile-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ========== RESPONSIVE BREAKPOINTS ========== */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
        width: 100%;
      }
      .mobile-sidebar-toggle {
        display: block;
      }
      .top-header {
        padding: 0.75rem 1rem;
      }
      .page-title {
        font-size: 1.2rem;
      }
      .content {
        padding: 1rem;
      }
      .card-body {
        padding: 1rem;
      }
      .form-row {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .form-actions {
        flex-direction: column;
      }
      .btn {
        justify-content: center;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .user-avatar {
        width: 34px;
        height: 34px;
        font-size: 0.9rem;
      }
      .image-preview img {
        width: 60px;
        height: 60px;
      }
      .form-group input,
      .form-group select {
        padding: 0.6rem 0.8rem;
        font-size: 0.85rem;
      }
      .card-header {
        padding: 0.8rem 1rem;
      }
      .card-title {
        font-size: 1rem;
      }
    }

    /* Simple icon fallback (no extra JS) */
    .icon-placeholder {
      display: inline-block;
      width: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="admin-wrapper">
  <!-- Mobile Overlay -->
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div class="sidebar-logo-icon">📱</div>
        <span>PhoneHub</span>
      </a>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">◀</button>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">
        <span class="icon-placeholder">📊</span> Dashboard
      </a></li>
      <li><a href="phone.html" class="active">
        <span class="icon-placeholder">📱</span> phone
      </a></li>
      <li><a href="add-phone-details.html">
        <span class="icon-placeholder">➕</span> Add Product
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="../index.html" class="back-to-site">
        <span>←</span> Back to Site
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" aria-label="Open menu">☰</button>
        <h1 class="page-title">Edit Product</h1>
      </div>
      <div class="user-avatar">A</div>
    </header>

    <div class="content">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Product Information (NovaTech X1 Pro)</h2>
        </div>
        <div class="card-body">
          <!-- Pure static form - no extra product logic, just responsive layout -->
          <form action="#" method="get">
            <input type="hidden" name="id" value="p1">

            <div class="form-group">
              <label>Product Name *</label>
              <input type="text" name="name" value="NovaTech X1 Pro" required>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Brand *</label>
                <input type="text" name="brand" value="NovaTech" required>
              </div>
              <div class="form-group">
                <label>Price (₦) *</label>
                <input type="number" name="price" value="245000" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>RAM</label>
                <input type="text" name="ram" value="12GB">
              </div>
              <div class="form-group">
                <label>Storage</label>
                <input type="text" name="storage" value="256GB">
              </div>
            </div>

            <div class="form-group">
              <label>Camera</label>
              <input type="text" name="camera" value="108MP Triple Camera">
            </div>

            <div class="form-group">
              <label>Display</label>
              <input type="text" name="display" value="6.7&quot; AMOLED 120Hz">
            </div>

            <div class="form-group">
              <label>Battery</label>
              <input type="text" name="battery" value="5000mAh">
            </div>

            <div class="form-group">
              <label>Operating System</label>
              <input type="text" name="os" value="Android 14">
            </div>

            <div class="form-group">
              <label>Colors (comma separated)</label>
              <input type="text" name="colors" value="Phantom Black, Silver, Blue">
            </div>

            <div class="form-group">
              <label>Image URL (relative path)</label>
              <input type="text" name="image" value="../images/phone-1.jpg">
              <div class="image-preview">
                <img src="../images/phone-1.jpg" alt="Product preview" onerror="this.src='https://placehold.co/80x80?text=No+Image'">
                <span class="image-note">Current image preview</span>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Status</label>
                <select name="status">
                  <option value="in-stock" selected>In Stock</option>
                  <option value="out-of-stock">Out of Stock</option>
                </select>
              </div>
              <div class="form-group">
                <label>Featured Product</label>
                <select name="featured">
                  <option value="true" selected>Yes (Featured)</option>
                  <option value="false">No</option>
                </select>
              </div>
            </div>

            <div class="form-actions">
              <a href="phone.html" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Only responsive sidebar functionality (no product add/edit logic) -->
<script>
  (function() {
    // Responsive sidebar toggle (mobile & desktop)
    const sidebar = document.getElementById('sidebar');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const mobileToggle = document.getElementById('mobileSidebarToggle');
    const sidebarToggle = document.getElementById('sidebarToggle');

    function openSidebar() {
      if (sidebar) {
        sidebar.classList.add('open');
        if (mobileOverlay) mobileOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
    }

    function closeSidebar() {
      if (sidebar) {
        sidebar.classList.remove('open');
        if (mobileOverlay) mobileOverlay.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    if (mobileToggle) {
      mobileToggle.addEventListener('click', openSidebar);
    }
    if (mobileOverlay) {
      mobileOverlay.addEventListener('click', closeSidebar);
    }
    // Optional: close sidebar when clicking a link inside sidebar on mobile
    if (sidebar) {
      sidebar.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          if (window.innerWidth <= 768) {
            closeSidebar();
          }
        });
      });
    }

    // Desktop sidebar collapse toggle (optional, does not affect responsiveness)
    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          closeSidebar();
        } else {
          sidebar.classList.toggle('collapsed');
          if (sidebar.classList.contains('collapsed')) {
            sidebar.style.width = '70px';
            document.querySelector('.main-content').style.marginLeft = '70px';
            document.querySelectorAll('.sidebar-nav li a span:not(.icon-placeholder), .sidebar-logo span, .sidebar-footer span').forEach(el => {
              if (el) el.style.display = 'none';
            });
          } else {
            sidebar.style.width = '260px';
            document.querySelector('.main-content').style.marginLeft = '260px';
            document.querySelectorAll('.sidebar-nav li a span, .sidebar-logo span, .sidebar-footer span').forEach(el => {
              if (el) el.style.display = 'inline';
            });
          }
        }
      });
    }

    // Close mobile sidebar on window resize if screen becomes wide
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        if (sidebar && sidebar.classList.contains('open')) {
          closeSidebar();
        }
        // Reset collapsed state if needed
        if (sidebar && sidebar.classList.contains('collapsed')) {
          sidebar.classList.remove('collapsed');
          sidebar.style.width = '260px';
          document.querySelector('.main-content').style.marginLeft = '260px';
          document.querySelectorAll('.sidebar-nav li a span, .sidebar-logo span, .sidebar-footer span').forEach(el => {
            if (el) el.style.display = 'inline';
          });
        }
      }
    });
  })();
</script>
</body>
</html>
