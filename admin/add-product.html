<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - PhoneHub Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-wrapper">
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
              <line x1="12" y1="18" x2="12.01" y2="18"></line>
            </svg>
          </div>
          <span class="sidebar-logo-text">PhoneHub</span>
        </a>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
      <ul class="sidebar-nav">
        <li><a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span>Dashboard</span>
        </a></li>
        <li><a href="products.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <line x1="12" y1="18" x2="12.01" y2="18"></line>
          </svg>
          <span>Products</span>
        </a></li>
        <li><a href="add-product.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>Add Product</span>
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="../index.html" class="back-to-site">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>Back to Site</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" aria-label="Open sidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <h1 class="page-title" id="pageTitle">Add Product</h1>
        </div>
        <div class="header-actions">
          <div class="user-avatar">A</div>
        </div>
      </header>

      <!-- Content -->
      <div class="content">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title" id="formTitle">Product Information</h2>
          </div>
          <div class="card-body">
            <form id="productForm" class="form-grid">
              <!-- Hidden ID field for editing -->
              <input type="hidden" id="productId">

              <!-- Image Upload -->
              <div class="form-group full-width image-preview-wrapper">
                <label class="form-label">Product Image</label>
                <div class="image-preview-area" id="imagePreviewArea">
                  <input type="file" id="productImage" accept="image/*">
                  <div class="preview-placeholder" id="previewPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                      <circle cx="8.5" cy="8.5" r="1.5"></circle>
                      <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span>Click to upload product image</span>
                    <span style="font-size: 0.8rem;">Recommended: 600x800px, PNG or JPG</span>
                  </div>
                  <img id="previewImg" class="preview-img" style="display: none;">
                </div>
              </div>

              <!-- Name -->
              <div class="form-group">
                <label class="form-label">Phone Name <span class="required">*</span></label>
                <input type="text" class="form-input" id="productName" placeholder="e.g. iPhone 15 Pro Max" required>
              </div>

              <!-- Brand -->
              <div class="form-group">
                <label class="form-label">Brand <span class="required">*</span></label>
                <input type="text" class="form-input" id="productBrand" placeholder="e.g. Apple, Samsung" required>
              </div>

              <!-- Price -->
              <div class="form-group">
                <label class="form-label">Price (₦) <span class="required">*</span></label>
                <input type="number" class="form-input" id="productPrice" placeholder="e.g. 450000" required>
              </div>

              <!-- RAM -->
              <div class="form-group">
                <label class="form-label">RAM</label>
                <input type="text" class="form-input" id="productRam" placeholder="e.g. 8GB">
              </div>

              <!-- Storage -->
              <div class="form-group">
                <label class="form-label">Storage</label>
                <input type="text" class="form-input" id="productStorage" placeholder="e.g. 256GB">
              </div>

              <!-- Camera -->
              <div class="form-group">
                <label class="form-label">Camera</label>
                <input type="text" class="form-input" id="productCamera" placeholder="e.g. 108MP Triple Camera">
              </div>

              <!-- Battery -->
              <div class="form-group">
                <label class="form-label">Battery</label>
                <input type="text" class="form-input" id="productBattery" placeholder="e.g. 5000mAh">
              </div>

              <!-- Display -->
              <div class="form-group">
                <label class="form-label">Display</label>
                <input type="text" class="form-input" id="productDisplay" placeholder="e.g. 6.7 AMOLED 120Hz">
              </div>

              <!-- OS -->
              <div class="form-group">
                <label class="form-label">Operating System</label>
                <input type="text" class="form-input" id="productOs" placeholder="e.g. Android 14">
              </div>

              <!-- Colors -->
              <div class="form-group">
                <label class="form-label">Colors (comma separated)</label>
                <input type="text" class="form-input" id="productColors" placeholder="e.g. Black, Silver, Blue">
              </div>

              <!-- Status -->
              <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-select" id="productStatus">
                  <option value="in-stock">In Stock</option>
                  <option value="out-of-stock">Out of Stock</option>
                </select>
              </div>

              <!-- Featured -->
              <div class="form-group">
                <label class="form-label">Featured Product</label>
                <label class="toggle-switch">
                  <input type="checkbox" id="productFeatured">
                  <span class="toggle-slider"></span>
                </label>
              </div>

              <!-- Form Actions -->
              <div class="form-group full-width form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                  Save Product
                </button>
                <a href="products.html" class="btn btn-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
